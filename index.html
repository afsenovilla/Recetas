<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#faf6f0" />
<title>Mi Recetario</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥘</text></svg>" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- ══ HEADER ══════════════════════════════════════════════ -->
<header class="site-header">
  <div class="logo">
    <span class="logo-main">Mi Recetario</span>
    <span class="logo-sub">— lo que sé hacer bien</span>
  </div>
  <div class="header-right">
    <button class="btn-circle" id="wake-btn" onclick="toggleWakeLock()" aria-label="Pantalla siempre activa" title="Mantener pantalla encendida">💤</button>
    <button class="btn-circle theme-toggle" onclick="toggleTheme()" aria-label="Cambiar tema" id="theme-btn">🌙</button>
    <button class="btn-circle" onclick="document.getElementById('search').focus()" aria-label="Buscar">🔍</button>
  </div>
</header>

<!-- ══ SEARCH + CHIPS ══════════════════════════════════════ -->
<div class="filter-bar">
  <div class="search-wrap">
    <span class="ico-search">🔍</span>
    <input type="search" id="search" placeholder="Buscar recetas…" oninput="renderCards()" autocomplete="off" />
  </div>
  <div class="chips-row" id="chips"></div>
</div>

<!-- ══ MAIN CANVAS ═════════════════════════════════════════ -->
<main class="recipe-page" id="recipe-page"></main>

<!-- ══ FAB ═════════════════════════════════════════════════ -->
<button class="fab" onclick="newRecipeWithAuth()">
  <span class="fab-plus">+</span> Nueva receta
</button>

<!-- ══ OVERLAY ═════════════════════════════════════════════ -->
<div class="overlay" id="overlay" onclick="closeAll()"></div>

<!-- ══ DETAIL SHEET ════════════════════════════════════════ -->
<div class="sheet" id="detail-sheet">
  <div class="sheet-handle"></div>
  <div id="detail-inner"></div>
</div>

<!-- ══ FORM SHEET ══════════════════════════════════════════ -->
<div class="sheet" id="form-sheet">
  <div class="sheet-handle"></div>
  <div class="form-header">
    <span class="form-header-title" id="form-title">Nueva receta</span>
    <button class="btn-close" onclick="closeAll()">✕</button>
  </div>
  <div class="form-body">
    <input type="hidden" id="f-id" value="" />

    <div class="f-group">
      <label class="f-label">Nombre *</label>
      <input class="f-input" id="f-name" placeholder="Ej: Pan de centeno" />
    </div>
    <div class="f-group">
      <label class="f-label">Descripción</label>
      <textarea class="f-textarea" id="f-desc" placeholder="Breve descripción…"></textarea>
    </div>
    <div class="f-row">
      <div class="f-group">
        <label class="f-label">Emoji</label>
        <input class="f-input" id="f-emoji" placeholder="🍞" style="font-size:1.4rem;text-align:center" maxlength="2" />
      </div>
      <div class="f-group">
        <label class="f-label">Categoría</label>
        <input class="f-input" id="f-cat" placeholder="Panadería" />
      </div>
    </div>
    <div class="f-row">
      <div class="f-group">
        <label class="f-label">Prep.</label>
        <input class="f-input" id="f-prep" placeholder="20 min" />
      </div>
      <div class="f-group">
        <label class="f-label">Cocción</label>
        <input class="f-input" id="f-cook" placeholder="30 min" />
      </div>
    </div>
    <div class="f-row">
      <div class="f-group">
        <label class="f-label">Total</label>
        <input class="f-input" id="f-total" placeholder="50 min" />
      </div>
      <div class="f-group">
        <label class="f-label">Raciones</label>
        <input class="f-input" id="f-servings" placeholder="8 uds" />
      </div>
    </div>
    <div class="f-row">
      <div class="f-group">
        <label class="f-label">Dificultad</label>
        <select class="f-input" id="f-diff">
          <option value="Fácil">Fácil</option>
          <option value="Media">Media</option>
          <option value="Difícil">Difícil</option>
        </select>
      </div>
      <div class="f-group">
        <label class="f-label">Color fondo</label>
        <input type="color" class="f-input" id="f-color" value="#f5e0c0" style="height:42px;padding:4px 8px;cursor:pointer" />
      </div>
    </div>

    <div class="f-group">
      <label class="f-label">Tipo de receta</label>
      <div class="diet-btns" id="diet-btns">
        <button class="diet-btn active" data-val="null" onclick="selectDiet(this)">Sin etiqueta</button>
        <button class="diet-btn" data-val="vegetariano" onclick="selectDiet(this)">🌿 Vegetariana</button>
        <button class="diet-btn" data-val="vegano" onclick="selectDiet(this)">🌱 Vegana</button>
      </div>
    </div>

    <div class="f-group">
      <label class="f-label">Alérgenos</label>
      <div class="allergen-checks" id="allergen-checks"></div>
    </div>

    <div class="f-group">
      <label class="f-label">Etiquetas (separadas por coma)</label>
      <input class="f-input" id="f-tags" placeholder="pan, sin reposo, canela" />
    </div>
    <div class="f-group">
      <label class="f-label">Ingredientes</label>
      <div class="dyn-list" id="ing-list"></div>
      <button class="btn-add-row" type="button" onclick="addIng()">+ Añadir ingrediente</button>
    </div>
    <div class="f-group">
      <label class="f-label">Pasos</label>
      <div class="dyn-list" id="step-list"></div>
      <button class="btn-add-row" type="button" onclick="addStep()">+ Añadir paso</button>
    </div>
    <div class="f-group">
      <label class="f-label">Consejo (opcional)</label>
      <textarea class="f-textarea" id="f-tips" placeholder="Trucos, variaciones, conservación…"></textarea>
    </div>
    <button class="btn-submit" type="button" onclick="saveRecipe()">Guardar receta</button>
  </div>
</div>

<!-- ══ TOAST ════════════════════════════════════════════════ -->
<div class="toast" id="toast"></div>

<!-- ══ SCRIPTS ══════════════════════════════════════════════ -->
<script>
/* ── ALLERGEN CONFIG ───────────────────────────────────── */
const ALLERGENS = [
  { id: 'gluten',       label: 'Gluten',       icon: '🌾' },
  { id: 'lacteos',      label: 'Lácteos',      icon: '🥛' },
  { id: 'huevos',       label: 'Huevos',       icon: '🥚' },
  { id: 'frutos_secos', label: 'Frutos secos', icon: '🥜' },
  { id: 'soja',         label: 'Soja',         icon: '🫘' },
  { id: 'pescado',      label: 'Pescado',      icon: '🐟' },
  { id: 'marisco',      label: 'Marisco',      icon: '🦐' },
  { id: 'sesamo',       label: 'Sésamo',       icon: '🌾' },
  { id: 'apio',         label: 'Apio',         icon: '🥬' },
  { id: 'mostaza',      label: 'Mostaza',      icon: '🌿' },
  { id: 'sulfitos',     label: 'Sulfitos',     icon: '🍇' },
  { id: 'altramuces',   label: 'Altramuces',   icon: '🌼' },
  { id: 'moluscos',     label: 'Moluscos',     icon: '🦑' },
  { id: 'cacahuetes',   label: 'Cacahuetes',   icon: '🥜' },
];

function allergenLabel(id) {
  const a = ALLERGENS.find(x => x.id === id);
  return a ? `${a.icon} ${a.label}` : id;
}

/* ── STATE ─────────────────────────────────────────────── */
let recipes = [];
let activeTag = 'todos';
let checked = {};
let done = {};

/* ── WAKE LOCK ──────────────────────────────────────────── */
let wakeLock = null;

async function toggleWakeLock() {
  const btn = document.getElementById('wake-btn');
  if (wakeLock) {
    await wakeLock.release();
    wakeLock = null;
    btn.textContent = '💤';
    btn.classList.remove('wake-active');
    showToast('Pantalla normal');
  } else {
    if (!('wakeLock' in navigator)) {
      showToast('Tu navegador no soporta esta función');
      return;
    }
    try {
      wakeLock = await navigator.wakeLock.request('screen');
      btn.textContent = '👁️';
      btn.classList.add('wake-active');
      showToast('Pantalla siempre activa ✓');
      wakeLock.addEventListener('release', () => {
        wakeLock = null;
        btn.textContent = '💤';
        btn.classList.remove('wake-active');
      });
    } catch(e) {
      showToast('No se pudo activar: ' + e.message);
    }
  }
}

// Re-acquire wake lock after visibility change (e.g. tab switch)
document.addEventListener('visibilitychange', async () => {
  if (wakeLock !== null && document.visibilityState === 'visible') {
    try {
      wakeLock = await navigator.wakeLock.request('screen');
    } catch(e) {}
  }
});

/* ── THEME ─────────────────────────────────────────────── */
function applyTheme(dark) {
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  document.getElementById('theme-btn').textContent = dark ? '☀️' : '🌙';
  document.querySelector('meta[name="theme-color"]').content = dark ? '#160e07' : '#faf6f0';
}
function toggleTheme() {
  const dark = document.documentElement.getAttribute('data-theme') !== 'dark';
  localStorage.setItem('theme', dark ? 'dark' : 'light');
  applyTheme(dark);
}

/* ── BOOT ───────────────────────────────────────────────── */
async function boot() {
  const saved = localStorage.getItem('theme');
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  applyTheme(saved ? saved === 'dark' : prefersDark);

  const stored = localStorage.getItem('recetario_v4');
  if (stored) {
    recipes = JSON.parse(stored);
  } else {
    try {
      const res = await fetch('recipes.json');
      recipes = await res.json();
      persist();
    } catch(e) { recipes = []; }
  }
  rebuildChips();
  renderCards();
}

function persist() {
  localStorage.setItem('recetario_v4', JSON.stringify(recipes));
}

/* ── CHIPS ──────────────────────────────────────────────── */
function rebuildChips() {
  const all = new Set();
  recipes.forEach(r => (r.tags||[]).forEach(t => all.add(t)));
  const container = document.getElementById('chips');
  container.innerHTML = '';
  ['todos', ...all].forEach(tag => {
    const btn = document.createElement('button');
    btn.className = 'chip' + (tag === activeTag ? ' active' : '');
    btn.dataset.tag = tag;
    btn.textContent = tag === 'todos' ? 'Todas' : cap(tag);
    btn.onclick = () => setChip(btn);
    container.appendChild(btn);
  });
}
function setChip(el) {
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  activeTag = el.dataset.tag;
  renderCards();
}
function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

/* ── FILTER ─────────────────────────────────────────────── */
function filterRecipes() {
  const q = (document.getElementById('search').value || '').trim().toLowerCase();
  let list = recipes;
  if (activeTag !== 'todos') list = list.filter(r => (r.tags||[]).includes(activeTag));
  if (q) list = list.filter(r =>
    r.name.toLowerCase().includes(q) ||
    (r.description||'').toLowerCase().includes(q) ||
    (r.tags||[]).some(t => t.includes(q)) ||
    (r.category||'').toLowerCase().includes(q)
  );
  return list;
}

/* ── DIET BADGE ─────────────────────────────────────────── */
function dietBadgeHTML(diet) {
  if (!diet) return '';
  const cls = diet === 'vegano' ? 'dbadge-vegan' : 'dbadge-vegetarian';
  const label = diet === 'vegano' ? '🌱 Vegano' : '🌿 Vegetariano';
  return `<span class="dbadge ${cls}">${label}</span>`;
}

/* ── RENDER CARDS ───────────────────────────────────────── */
function renderCards() {
  const page = document.getElementById('recipe-page');
  const list = filterRecipes();

  if (list.length === 0) {
    page.innerHTML = `<div class="empty-state">
      <span class="e-emoji">🥣</span>
      <h3>Sin resultados</h3>
      <p>Prueba otro término o añade una nueva receta.</p>
    </div>`;
    return;
  }

  // Build cards as DOM nodes to avoid innerHTML corruption
  page.innerHTML = '';

  list.forEach((r, i) => {
    const card = document.createElement('div');
    card.className = 'recipe-card card-standard';
    card.style.animationDelay = (i * 55) + 'ms';
    card.addEventListener('click', () => openDetail(r.id));

    const dietBadge = dietBadgeHTML(r.diet);
    const badgesBlock = dietBadge ? `<div class="card-badges">${dietBadge}</div>` : '';
    const tagsHTML = (r.tags||[]).map(t=>`<span class="ctag">${t}</span>`).join('');

    card.innerHTML = `
      <div class="card-emoji-col" style="background:${r.color}30">${r.emoji||'🍽️'}</div>
      <div class="card-body">
        <div class="card-cat">${r.category||''}</div>
        ${badgesBlock}
        <div class="card-title">${r.name}</div>
        ${r.description ? `<p class="card-desc">${r.description}</p>` : ''}
        <div class="card-meta">
          <span class="meta-item"><span class="meta-icon">⏱</span>${r.prepTime}</span>
          <span class="meta-item"><span class="meta-icon">🍽</span>${r.servings}</span>
          ${r.difficulty ? `<span class="meta-item"><span class="meta-icon">📊</span>${r.difficulty}</span>` : ''}
        </div>
        ${tagsHTML ? `<div class="card-tags">${tagsHTML}</div>` : ''}
      </div>`;

    page.appendChild(card);
  });
}

/* ── DETAIL SHEET ───────────────────────────────────────── */
function openDetail(id) {
  const r = recipes.find(x => x.id === id);
  if (!r) return;
  if (!checked[id]) checked[id] = {};
  if (!done[id]) done[id] = {};

  const allergens = r.allergens || [];
  let allergenHTML = '';
  if (allergens.length > 0) {
    allergenHTML = `
    <div class="allergen-section">
      <div class="allergen-title">⚠️ Contiene alérgenos</div>
      <div class="allergen-list">
        ${allergens.map(a => `<span class="allergen-tag">${allergenLabel(a)}</span>`).join('')}
      </div>
    </div>`;
  } else {
    allergenHTML = `
    <div class="allergen-section">
      <div class="allergen-title">Alérgenos</div>
      <span class="allergen-free">✓ Sin alérgenos declarados</span>
    </div>`;
  }

  const dietBadge = dietBadgeHTML(r.diet);
  const badgesBlock = dietBadge ? `<div class="detail-badges">${dietBadge}</div>` : '';

  const inner = document.getElementById('detail-inner');
  inner.innerHTML = '';

  const colorBand = document.createElement('div');
  colorBand.className = 'detail-color-band';
  colorBand.style.background = r.color;
  inner.appendChild(colorBand);

  const emojiDiv = document.createElement('div');
  emojiDiv.className = 'detail-emoji';
  emojiDiv.textContent = r.emoji || '🍽️';
  inner.appendChild(emojiDiv);

  const body = document.createElement('div');
  body.className = 'detail-body';

  // Build ingredients list
  const ingsHTML = (r.ingredients||[]).map((ing, i) => `
    <li class="ing-item ${checked[id][i]?'checked':''}" data-idx="${i}">
      <span class="ing-check"></span>
      <span class="ing-amount">${ing.amount}</span>
      <span class="ing-name-text">${ing.name}</span>
    </li>`).join('');

  // Build steps list
  const stepsHTML = (r.steps||[]).map((s, i) => `
    <li class="step-item ${done[id][i]?'done':''}" data-idx="${i}">
      <span class="step-num">${i+1}</span>
      <p class="step-text">${s}</p>
    </li>`).join('');

  body.innerHTML = `
    <div class="detail-cat">${r.category||''}</div>
    ${badgesBlock}
    <h1 class="detail-title">${r.name}</h1>
    ${r.description ? `<p class="detail-desc">${r.description}</p>` : ''}
    <div class="detail-stats">
      <div class="dstat"><span class="dstat-icon">⏱</span><span class="dstat-val">${r.prepTime}</span><span class="dstat-lbl">Prep.</span></div>
      <div class="dstat"><span class="dstat-icon">🔥</span><span class="dstat-val">${r.cookTime}</span><span class="dstat-lbl">Cocción</span></div>
      <div class="dstat"><span class="dstat-icon">🍽</span><span class="dstat-val">${r.servings}</span><span class="dstat-lbl">Raciones</span></div>
      <div class="dstat"><span class="dstat-icon">📊</span><span class="dstat-val">${r.difficulty||'—'}</span><span class="dstat-lbl">Nivel</span></div>
    </div>
    ${allergenHTML}
    ${ingsHTML ? `<h3 class="sec-title">Ingredientes</h3><ul class="ing-list">${ingsHTML}</ul>` : ''}
    ${stepsHTML ? `<h3 class="sec-title">Elaboración</h3><ol class="steps-list">${stepsHTML}</ol>` : ''}
    ${r.tips ? `<h3 class="sec-title">Consejo</h3><div class="tips-box">${r.tips}</div>` : ''}
    <div class="detail-actions">
      <button class="btn-edit" id="btn-edit-${id}" type="button">✏️ Editar receta</button>
      <button class="btn-delete" id="btn-delete-${id}" type="button">🗑</button>
    </div>`;

  inner.appendChild(body);

  // Attach event listeners directly (no inline onclick — avoids scope issues)
  body.querySelector('.ing-list') && body.querySelector('.ing-list').addEventListener('click', e => {
    const li = e.target.closest('.ing-item');
    if (!li) return;
    const idx = parseInt(li.dataset.idx);
    checked[id][idx] = !checked[id][idx];
    li.classList.toggle('checked', checked[id][idx]);
  });

  body.querySelector('.steps-list') && body.querySelector('.steps-list').addEventListener('click', e => {
    const li = e.target.closest('.step-item');
    if (!li) return;
    const idx = parseInt(li.dataset.idx);
    done[id][idx] = !done[id][idx];
    li.classList.toggle('done', done[id][idx]);
  });

  document.getElementById(`btn-edit-${id}`).addEventListener('click', () => editRecipe(id));
  document.getElementById(`btn-delete-${id}`).addEventListener('click', () => askDelete(id));

  openSheet('detail-sheet');
}

function newRecipeWithAuth() {
  const pwd = prompt('Introduce la contraseña para añadir una receta:');
  if (pwd === null) return;
  if (pwd !== '1234') { showToast('Contraseña incorrecta'); return; }
  openForm(null);
}

/* ── EDIT with password ─────────────────────────────────── */
function editRecipe(id) {
  const pwd = prompt('Introduce la contraseña para editar:');
  if (pwd === null) return; // cancelado
  if (pwd !== '1234') {
    showToast('Contraseña incorrecta');
    return;
  }
  closeDetailOnly();
  setTimeout(() => openForm(id), 320);
}

function askDelete(id) {
  const pwd = prompt('Introduce la contraseña para eliminar:');
  if (pwd === null) return;
  if (pwd !== '1234') { showToast('Contraseña incorrecta'); return; }
  const r = recipes.find(x => x.id === id);
  if (!confirm(`¿Eliminar "${r.name}" de forma permanente?`)) return;
  recipes = recipes.filter(x => x.id !== id);
  persist(); rebuildChips(); closeAll(); renderCards();
  showToast('Receta eliminada');
}

/* ── FORM ───────────────────────────────────────────────── */
function buildAllergenChecks(selected=[]) {
  const container = document.getElementById('allergen-checks');
  container.innerHTML = '';
  ALLERGENS.forEach(a => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'allergen-check-btn' + (selected.includes(a.id) ? ' selected' : '');
    btn.dataset.id = a.id;
    btn.textContent = `${a.icon} ${a.label}`;
    btn.addEventListener('click', () => btn.classList.toggle('selected'));
    container.appendChild(btn);
  });
}

function selectDiet(el) {
  document.querySelectorAll('.diet-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}

function openForm(editId) {
  const r = editId ? recipes.find(x => x.id === editId) : null;
  document.getElementById('form-title').textContent = r ? 'Editar receta' : 'Nueva receta';
  document.getElementById('f-id').value = r ? String(r.id) : '';

  const setVal = (elId, val) => {
    const el = document.getElementById(elId);
    if (el) el.value = (val != null ? val : '');
  };

  setVal('f-name',     r?.name);
  setVal('f-desc',     r?.description);
  setVal('f-emoji',    r?.emoji);
  setVal('f-cat',      r?.category);
  setVal('f-prep',     r?.prepTime);
  setVal('f-cook',     r?.cookTime);
  setVal('f-total',    r?.totalTime);
  setVal('f-servings', r?.servings);
  setVal('f-tips',     r?.tips);
  setVal('f-tags',     r ? (r.tags||[]).join(', ') : '');
  document.getElementById('f-diff').value  = r?.difficulty || 'Fácil';
  document.getElementById('f-color').value = r?.color || '#f5e0c0';

  // Diet
  const dietVal = r?.diet ?? null;
  document.querySelectorAll('.diet-btn').forEach(b => {
    const bVal = b.dataset.val === 'null' ? null : b.dataset.val;
    b.classList.toggle('active', bVal === dietVal);
  });

  // Allergens
  buildAllergenChecks(r?.allergens || []);

  // Ingredients
  const ingList = document.getElementById('ing-list');
  ingList.innerHTML = '';
  if (r && r.ingredients?.length) {
    r.ingredients.forEach(ing => addIng(ing.amount, ing.name));
  } else {
    addIng(); addIng(); addIng();
  }

  // Steps
  const stepList = document.getElementById('step-list');
  stepList.innerHTML = '';
  if (r && r.steps?.length) {
    r.steps.forEach(s => addStep(s));
  } else {
    addStep(); addStep();
  }

  openSheet('form-sheet');
}

function addIng(amount='', name='') {
  const el = document.createElement('div');
  el.className = 'ing-dyn';
  const inp1 = document.createElement('input');
  inp1.className = 'f-input';
  inp1.placeholder = '100 g';
  inp1.value = amount;
  const inp2 = document.createElement('input');
  inp2.className = 'f-input';
  inp2.placeholder = 'ingrediente';
  inp2.value = name;
  const rm = document.createElement('button');
  rm.type = 'button';
  rm.className = 'btn-rm';
  rm.textContent = '✕';
  rm.addEventListener('click', () => el.remove());
  el.appendChild(inp1);
  el.appendChild(inp2);
  el.appendChild(rm);
  document.getElementById('ing-list').appendChild(el);
}

function addStep(val='') {
  const n = document.getElementById('step-list').children.length + 1;
  const el = document.createElement('div');
  el.className = 'dyn-item';
  const num = document.createElement('span');
  num.className = 'step-dyn-num';
  num.textContent = n;
  const ta = document.createElement('textarea');
  ta.className = 'f-textarea f-step-ta';
  ta.placeholder = `Paso ${n}…`;
  ta.value = val;
  ta.rows = 2;
  const rm = document.createElement('button');
  rm.type = 'button';
  rm.className = 'btn-rm';
  rm.textContent = '✕';
  rm.addEventListener('click', () => el.remove());
  el.appendChild(num);
  el.appendChild(ta);
  el.appendChild(rm);
  document.getElementById('step-list').appendChild(el);
}

function saveRecipe() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { showToast('El nombre es obligatorio'); return; }

  const ingredients = [...document.querySelectorAll('#ing-list .ing-dyn')].map(row => {
    const ins = row.querySelectorAll('input');
    return { amount: ins[0].value.trim(), name: ins[1].value.trim() };
  }).filter(i => i.name);

  const steps = [...document.querySelectorAll('#step-list .dyn-item textarea')]
    .map(ta => ta.value.trim()).filter(Boolean);

  const tags = document.getElementById('f-tags').value.split(',').map(t=>t.trim()).filter(Boolean);

  const activeDietBtn = document.querySelector('.diet-btn.active');
  const dietVal = activeDietBtn?.dataset.val ?? 'null';
  const diet = dietVal === 'null' ? null : dietVal;

  const allergens = [...document.querySelectorAll('.allergen-check-btn.selected')].map(b => b.dataset.id);

  const editIdStr = document.getElementById('f-id').value.trim();
  const editId = editIdStr ? parseInt(editIdStr, 10) : null;

  const recipe = {
    id: editId || Date.now(),
    name,
    description: document.getElementById('f-desc').value.trim(),
    emoji: document.getElementById('f-emoji').value.trim() || '🍽️',
    category: document.getElementById('f-cat').value.trim() || 'Sin categoría',
    prepTime:  document.getElementById('f-prep').value.trim() || '—',
    cookTime:  document.getElementById('f-cook').value.trim() || '—',
    totalTime: document.getElementById('f-total').value.trim() || '—',
    servings:  document.getElementById('f-servings').value.trim() || '—',
    difficulty: document.getElementById('f-diff').value,
    color: document.getElementById('f-color').value,
    diet, allergens, tags, ingredients, steps,
    tips: document.getElementById('f-tips').value.trim(),
  };

  if (editId) {
    const idx = recipes.findIndex(x => x.id === editId);
    if (idx >= 0) {
      recipes[idx] = recipe;
    } else {
      recipes.unshift(recipe);
    }
    showToast('Receta actualizada ✓');
  } else {
    recipes.unshift(recipe);
    showToast('¡Receta guardada! 🎉');
  }

  persist();
  rebuildChips();
  closeAll();
  renderCards();
}

/* ── SHEET HELPERS ──────────────────────────────────────── */
function openSheet(id) {
  document.getElementById('overlay').classList.add('open');
  document.getElementById(id).classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeDetailOnly() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('detail-sheet').classList.remove('open');
  document.body.style.overflow = '';
}

function closeAll() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('detail-sheet').classList.remove('open');
  document.getElementById('form-sheet').classList.remove('open');
  document.body.style.overflow = '';
}

/* ── SWIPE TO CLOSE ─────────────────────────────────────── */
let touchY0 = 0;
document.querySelectorAll('.sheet').forEach(s => {
  s.addEventListener('touchstart', e => { touchY0 = e.touches[0].clientY; }, { passive: true });
  s.addEventListener('touchend', e => {
    if (e.changedTouches[0].clientY - touchY0 > 80) closeAll();
  }, { passive: true });
});

/* ── TOAST ──────────────────────────────────────────────── */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2700);
}

boot();
</script>
