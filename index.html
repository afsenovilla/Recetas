<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f7f2ea" />
  <title>Mi Recetario</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- ══ HEADER ══════════════════════════════════════════════ -->
<header class="site-header">
  <div class="logo">
    <span class="logo-main">Mi Recetario</span>
    <span class="logo-sub">cocina con amor</span>
  </div>
  <div class="header-right">
    <button class="btn-circle" onclick="document.getElementById('search').focus()" aria-label="Buscar">
      🔍
    </button>
  </div>
</header>

<!-- ══ SEARCH + CHIPS ══════════════════════════════════════ -->
<div class="filter-bar">
  <div class="search-wrap">
    <span class="ico-search">🔍</span>
    <input type="search" id="search" placeholder="Buscar recetas…" oninput="renderBento()" autocomplete="off" />
  </div>
  <div class="chips-row" id="chips">
    <button class="chip active" data-tag="todos" onclick="setChip(this)">Todas</button>
  </div>
</div>

<!-- ══ BENTO CANVAS ════════════════════════════════════════ -->
<main class="bento-page" id="bento-page"></main>

<!-- ══ FAB ═════════════════════════════════════════════════ -->
<button class="fab" onclick="openForm()">
  <span class="fab-plus">+</span> Nueva receta
</button>

<!-- ══ OVERLAY ═════════════════════════════════════════════ -->
<div class="overlay" id="overlay" onclick="closeAll()"></div>

<!-- ══ DETAIL SHEET ════════════════════════════════════════ -->
<div class="sheet" id="detail-sheet">
  <div class="sheet-handle"></div>
  <div id="detail-inner"></div>
</div>

<!-- ══ FORM SHEET ══════════════════════════════════════════ -->
<div class="sheet" id="form-sheet">
  <div class="sheet-handle"></div>
  <div class="form-header">
    <span class="form-header-title">Nueva receta</span>
    <button class="btn-close" onclick="closeAll()">✕</button>
  </div>
  <div class="form-body">
    <div class="f-group">
      <label class="f-label">Nombre *</label>
      <input class="f-input" id="f-name" placeholder="Ej: Tarta de manzana" />
    </div>
    <div class="f-group">
      <label class="f-label">Descripción</label>
      <textarea class="f-textarea" id="f-desc" placeholder="Breve descripción…"></textarea>
    </div>
    <div class="f-row">
      <div class="f-group">
        <label class="f-label">Emoji</label>
        <input class="f-input" id="f-emoji" placeholder="🍰" style="font-size:1.4rem;text-align:center" maxlength="2" />
      </div>
      <div class="f-group">
        <label class="f-label">Categoría</label>
        <input class="f-input" id="f-cat" placeholder="Repostería" />
      </div>
    </div>
    <div class="f-row">
      <div class="f-group">
        <label class="f-label">Prep.</label>
        <input class="f-input" id="f-prep" placeholder="20 min" />
      </div>
      <div class="f-group">
        <label class="f-label">Cocción</label>
        <input class="f-input" id="f-cook" placeholder="30 min" />
      </div>
    </div>
    <div class="f-row">
      <div class="f-group">
        <label class="f-label">Total</label>
        <input class="f-input" id="f-total" placeholder="50 min" />
      </div>
      <div class="f-group">
        <label class="f-label">Raciones</label>
        <input class="f-input" id="f-servings" placeholder="8 uds" />
      </div>
    </div>
    <div class="f-row">
      <div class="f-group">
        <label class="f-label">Dificultad</label>
        <select class="f-input" id="f-diff">
          <option value="Fácil">Fácil</option>
          <option value="Media">Media</option>
          <option value="Difícil">Difícil</option>
        </select>
      </div>
      <div class="f-group">
        <label class="f-label">Color fondo</label>
        <input type="color" class="f-input" id="f-color" value="#f5e6c8" style="height:42px;padding:4px 8px;cursor:pointer" />
      </div>
    </div>
    <div class="f-group">
      <label class="f-label">Etiquetas (coma)</label>
      <input class="f-input" id="f-tags" placeholder="fácil, repostería, merienda" />
    </div>
    <div class="f-group">
      <label class="f-label">Ingredientes</label>
      <div class="dyn-list" id="ing-list"></div>
      <button class="btn-add-row" onclick="addIng()">+ Añadir ingrediente</button>
    </div>
    <div class="f-group">
      <label class="f-label">Pasos</label>
      <div class="dyn-list" id="step-list"></div>
      <button class="btn-add-row" onclick="addStep()">+ Añadir paso</button>
    </div>
    <div class="f-group">
      <label class="f-label">Consejo (opcional)</label>
      <textarea class="f-textarea" id="f-tips" placeholder="Trucos, variaciones…"></textarea>
    </div>
    <button class="btn-submit" onclick="saveRecipe()">Guardar receta</button>
  </div>
</div>

<!-- ══ TOAST ════════════════════════════════════════════════ -->
<div class="toast" id="toast"></div>

<!-- ══ SCRIPTS ══════════════════════════════════════════════ -->
<script>
/* ──────────────────────────────────────────────────────────
   STATE
────────────────────────────────────────────────────────── */
let recipes = [];
let activeTag = 'todos';
let checked = {};   // { recipeId: { ingIdx: bool } }
let done    = {};   // { recipeId: { stepIdx: bool } }

/* ──────────────────────────────────────────────────────────
   BOOT — fetch JSON, then render
────────────────────────────────────────────────────────── */
async function boot() {
  const stored = localStorage.getItem('recetario_v2');
  if (stored) {
    recipes = JSON.parse(stored);
  } else {
    try {
      const res  = await fetch('recipes.json');
      const seed = await res.json();
      recipes = seed;
      persist();
    } catch(e) {
      recipes = [];
    }
  }
  rebuildChips();
  renderBento();
}

function persist() {
  localStorage.setItem('recetario_v2', JSON.stringify(recipes));
}

/* ──────────────────────────────────────────────────────────
   CHIPS
────────────────────────────────────────────────────────── */
function rebuildChips() {
  const all = new Set();
  recipes.forEach(r => (r.tags||[]).forEach(t => all.add(t)));
  const container = document.getElementById('chips');
  container.innerHTML = '';
  const fixed = ['todos', ...all];
  fixed.forEach(tag => {
    const btn = document.createElement('button');
    btn.className = 'chip' + (tag === activeTag ? ' active' : '');
    btn.dataset.tag = tag;
    btn.textContent = tag === 'todos' ? 'Todas' : cap(tag);
    btn.onclick = () => setChip(btn);
    container.appendChild(btn);
  });
}

function setChip(el) {
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  activeTag = el.dataset.tag;
  renderBento();
}

function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

/* ──────────────────────────────────────────────────────────
   BENTO RENDER
────────────────────────────────────────────────────────── */
function filterRecipes() {
  const q = (document.getElementById('search').value || '').trim().toLowerCase();
  let list = recipes;
  if (activeTag !== 'todos') list = list.filter(r => (r.tags||[]).includes(activeTag));
  if (q) list = list.filter(r =>
    r.name.toLowerCase().includes(q) ||
    (r.description||'').toLowerCase().includes(q) ||
    (r.tags||[]).some(t => t.includes(q))
  );
  return list;
}

function renderBento() {
  const page = document.getElementById('bento-page');
  const list = filterRecipes();

  if (list.length === 0) {
    page.innerHTML = `<div class="empty-state">
      <span class="e-emoji">🥣</span>
      <h3>Sin resultados</h3>
      <p>Prueba otro término o añade una nueva receta.</p>
    </div>`;
    return;
  }

  let html = '';

  list.forEach((r, i) => {
    const bg = r.color || '#f5e6c8';

    if (i === 0) {
      /* ── FIRST RECIPE: full-width hero + stats row ── */
      html += `
      <!-- Hero -->
      <div class="bento-row">
        <div class="b-cell cell-hero b-fill b-h260" style="background:${bg}" onclick="openDetail(${r.id})">
          <div class="hero-emoji-bg" style="background:${bg}">${r.emoji||'🍽️'}</div>
          <div class="hero-body">
            <div class="hero-cat">${r.category||''}</div>
            <h2 class="hero-title">${r.name}</h2>
            <div class="hero-meta">
              <span>⏱ ${r.prepTime}</span>
              <span>🔥 ${r.cookTime}</span>
              <span>🍽 ${r.servings}</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Stats row for hero recipe -->
      <div class="bento-row">
        <div class="b-cell cell-stat b-fill b-h120" style="background:${bg}20" onclick="openDetail(${r.id})">
          <span class="st-icon">⏱</span>
          <span class="st-val">${r.prepTime}</span>
          <span class="st-lbl">Preparación</span>
        </div>
        <div class="b-cell cell-stat b-fill b-h120" style="background:${bg}30" onclick="openDetail(${r.id})">
          <span class="st-icon">🔥</span>
          <span class="st-val">${r.cookTime}</span>
          <span class="st-lbl">Cocción</span>
        </div>
        <div class="b-cell cell-diff b-fill b-h120" onclick="openDetail(${r.id})">
          <span class="diff-label">Dificultad</span>
          <span class="diff-val">${r.difficulty||'—'}</span>
          ${diffDots(r.difficulty)}
        </div>
      </div>

      <!-- Tip + tags row for hero recipe -->
      <div class="bento-row">
        ${r.tips ? `
        <div class="b-cell cell-tip b-w60 b-h150" onclick="openDetail(${r.id})">
          <span class="tip-icon">💡</span>
          <span class="tip-label">Consejo</span>
          <p class="tip-text">${truncate(r.tips, 90)}</p>
        </div>` : `
        <div class="b-cell cell-ingcount b-w60 b-h150" onclick="openDetail(${r.id})">
          <span class="ic-num">${(r.ingredients||[]).length}</span>
          <span class="ic-lbl">Ingredientes</span>
        </div>`}
        <div class="b-cell cell-tags b-fill b-h150" onclick="openDetail(${r.id})">
          ${(r.tags||[]).map(t=>`<span class="ctag">${t}</span>`).join('')}
        </div>
      </div>`;

    } else if (i % 3 === 1) {
      /* ── ODD PAIRS: emoji square + title tall ── */
      const next = list[i+1];
      html += `<div class="bento-row">
        <!-- Left column: emoji + stat stacked -->
        <div style="display:flex;flex-direction:column;gap:10px;width:42%;flex-shrink:0">
          <div class="b-cell cell-emoji b-h150" style="background:${bg}" onclick="openDetail(${r.id})">${r.emoji||'🍽️'}</div>
          <div class="b-cell cell-ingcount b-h120" onclick="openDetail(${r.id})">
            <span class="ic-num">${(r.ingredients||[]).length}</span>
            <span class="ic-lbl">ingredientes</span>
          </div>
        </div>
        <!-- Right: title card tall -->
        <div class="b-cell cell-title b-fill b-h280" onclick="openDetail(${r.id})" style="background:${bg}40">
          <div class="ct-cat">${r.category||''}</div>
          <div class="ct-name">${r.name}</div>
          <div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:4px">
            ${(r.tags||[]).slice(0,3).map(t=>`<span class="ctag">${t}</span>`).join('')}
          </div>
        </div>
      </div>`;

    } else if (i % 3 === 2) {
      /* ── EVERY 3RD: small stats duo ── */
      html += `
      <div class="bento-row">
        <div class="b-cell cell-stat b-fill b-h120" style="background:${bg}25" onclick="openDetail(${r.id})">
          <span class="st-icon">⏱</span>
          <span class="st-val">${r.prepTime}</span>
          <span class="st-lbl">Prep.</span>
        </div>
        <div class="b-cell cell-stat b-fill b-h120" style="background:${bg}40" onclick="openDetail(${r.id})">
          <span class="st-icon">🍽</span>
          <span class="st-val">${r.servings}</span>
          <span class="st-lbl">Raciones</span>
        </div>
      </div>`;
    }
  });

  /* CTA card — always at the end */
  html += `
  <div class="bento-row">
    <div class="b-cell cell-cta b-fill b-h120" onclick="openForm()">
      <span class="cta-plus">+</span>
      <span class="cta-text">Nueva receta</span>
    </div>
  </div>`;

  page.innerHTML = html;
}

function diffDots(d) {
  const levels = { 'Fácil': 1, 'Media': 2, 'Difícil': 3 };
  const n = levels[d] || 1;
  return `<div class="diff-dots">${[1,2,3].map(i=>`<span class="diff-dot ${i<=n?'on':''}"></span>`).join('')}</div>`;
}

function truncate(s, n) {
  return s.length > n ? s.slice(0, n) + '…' : s;
}

/* ──────────────────────────────────────────────────────────
   DETAIL SHEET
────────────────────────────────────────────────────────── */
function openDetail(id) {
  const r = recipes.find(x => x.id === id);
  if (!r) return;
  if (!checked[id]) checked[id] = {};
  if (!done[id])    done[id]    = {};

  const ings = (r.ingredients||[]).map((ing, i) => `
    <li class="ing-item ${checked[id][i]?'checked':''}" onclick="toggleIng(${id},${i},this)">
      <span class="ing-check"></span>
      <span class="ing-amount">${ing.amount}</span>
      <span class="ing-name-text">${ing.name}</span>
    </li>`).join('');

  const steps = (r.steps||[]).map((s, i) => `
    <li class="step-item ${done[id][i]?'done':''}" onclick="toggleStep(${id},${i},this)">
      <span class="step-num">${i+1}</span>
      <p class="step-text">${s}</p>
    </li>`).join('');

  document.getElementById('detail-inner').innerHTML = `
    <div class="detail-hero-emoji" style="background:${r.color||'#f5e6c8'}">${r.emoji||'🍽️'}</div>
    <div class="detail-body">
      <div class="detail-cat">${r.category||''}</div>
      <h1 class="detail-title">${r.name}</h1>
      ${r.description ? `<p class="detail-desc">${r.description}</p>` : ''}
      <div class="detail-bento">
        <div class="dstat"><span class="dstat-icon">⏱</span><span class="dstat-val">${r.prepTime}</span><span class="dstat-lbl">Prep.</span></div>
        <div class="dstat"><span class="dstat-icon">🔥</span><span class="dstat-val">${r.cookTime}</span><span class="dstat-lbl">Cocción</span></div>
        <div class="dstat"><span class="dstat-icon">🍽</span><span class="dstat-val">${r.servings}</span><span class="dstat-lbl">Raciones</span></div>
      </div>
      ${ings   ? `<h3 class="sec-title">Ingredientes</h3><ul class="ing-list">${ings}</ul>` : ''}
      ${steps  ? `<h3 class="sec-title">Elaboración</h3><ol class="steps-list">${steps}</ol>` : ''}
      ${r.tips ? `<h3 class="sec-title">Consejo</h3><div class="tips-box">${r.tips}</div>` : ''}
    </div>`;

  openSheet('detail-sheet');
}

function toggleIng(rid, idx, el) {
  checked[rid][idx] = !checked[rid][idx];
  el.classList.toggle('checked', checked[rid][idx]);
}
function toggleStep(rid, idx, el) {
  done[rid][idx] = !done[rid][idx];
  el.classList.toggle('done', done[rid][idx]);
}

/* ──────────────────────────────────────────────────────────
   FORM
────────────────────────────────────────────────────────── */
function openForm() {
  resetForm();
  openSheet('form-sheet');
}

function resetForm() {
  ['f-name','f-desc','f-emoji','f-cat','f-prep','f-cook','f-total','f-servings','f-tags','f-tips'].forEach(id => {
    const el = document.getElementById(id); if(el) el.value = '';
  });
  document.getElementById('f-color').value = '#f5e6c8';
  document.getElementById('f-diff').value  = 'Fácil';
  document.getElementById('ing-list').innerHTML  = '';
  document.getElementById('step-list').innerHTML = '';
  addIng(); addIng(); addIng();
  addStep(); addStep();
}

function addIng(amount='', name='') {
  const el = document.createElement('div');
  el.className = 'ing-dyn';
  el.innerHTML = `<input class="f-input" placeholder="100 g" value="${amount}" />
    <input class="f-input" placeholder="ingrediente" value="${name}" />
    <button class="btn-rm" onclick="this.parentElement.remove()">✕</button>`;
  document.getElementById('ing-list').appendChild(el);
}

function addStep(val='') {
  const n  = document.getElementById('step-list').children.length + 1;
  const el = document.createElement('div');
  el.className = 'dyn-item';
  el.innerHTML = `<input class="f-input" placeholder="Paso ${n}…" value="${val}" style="flex:1" />
    <button class="btn-rm" onclick="this.parentElement.remove()">✕</button>`;
  document.getElementById('step-list').appendChild(el);
}

function saveRecipe() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { showToast('El nombre es obligatorio'); return; }

  const ingredients = [...document.querySelectorAll('#ing-list .ing-dyn')].map(row => {
    const ins = row.querySelectorAll('input');
    return { amount: ins[0].value.trim(), name: ins[1].value.trim() };
  }).filter(i => i.name);

  const steps = [...document.querySelectorAll('#step-list .dyn-item input')]
    .map(i => i.value.trim()).filter(Boolean);

  const tags = document.getElementById('f-tags').value.split(',').map(t=>t.trim()).filter(Boolean);

  recipes.unshift({
    id:          Date.now(),
    name,
    description: document.getElementById('f-desc').value.trim(),
    emoji:       document.getElementById('f-emoji').value.trim() || '🍽️',
    category:    document.getElementById('f-cat').value.trim()  || 'Sin categoría',
    prepTime:    document.getElementById('f-prep').value.trim() || '—',
    cookTime:    document.getElementById('f-cook').value.trim() || '—',
    totalTime:   document.getElementById('f-total').value.trim()|| '—',
    servings:    document.getElementById('f-servings').value.trim() || '—',
    difficulty:  document.getElementById('f-diff').value,
    color:       document.getElementById('f-color').value,
    tags, ingredients, steps,
    tips: document.getElementById('f-tips').value.trim(),
  });

  persist();
  rebuildChips();
  closeAll();
  renderBento();
  showToast('¡Receta guardada! 🎉');
}

/* ──────────────────────────────────────────────────────────
   SHEET HELPERS
────────────────────────────────────────────────────────── */
function openSheet(id) {
  document.getElementById('overlay').classList.add('open');
  document.getElementById(id).classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeAll() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('detail-sheet').classList.remove('open');
  document.getElementById('form-sheet').classList.remove('open');
  document.body.style.overflow = '';
}

/* ──────────────────────────────────────────────────────────
   SWIPE TO CLOSE
────────────────────────────────────────────────────────── */
let touchY0 = 0;
document.querySelectorAll('.sheet').forEach(s => {
  s.addEventListener('touchstart', e => { touchY0 = e.touches[0].clientY; }, { passive: true });
  s.addEventListener('touchend',   e => { if (e.changedTouches[0].clientY - touchY0 > 80) closeAll(); }, { passive: true });
});

/* ──────────────────────────────────────────────────────────
   TOAST
────────────────────────────────────────────────────────── */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2700);
}

/* ──────────────────────────────────────────────────────────
   INIT
────────────────────────────────────────────────────────── */
boot();
</script>
</body>
</html>
