<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#faf6f0" />
<title>Mi Recetario</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥘</text></svg>" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- ══ HEADER ══════════════════════════════════════════════ -->
<header class="site-header">
  <div class="logo">
    <span class="logo-main">Mi Recetario</span>
    <span class="logo-sub">— lo que sé hacer bien</span>
  </div>
  <div class="header-right">
    <button class="btn-circle" id="wake-btn" onclick="toggleWakeLock()" aria-label="Pantalla siempre activa" title="Mantener pantalla encendida">💤</button>
    <button class="btn-circle theme-toggle" onclick="toggleTheme()" aria-label="Cambiar tema" id="theme-btn">🌙</button>
    <button class="btn-circle" onclick="document.getElementById('search').focus()" aria-label="Buscar">🔍</button>
  </div>
</header>

<!-- ══ SEARCH + CHIPS ══════════════════════════════════════ -->
<div class="filter-bar">
  <div class="search-wrap">
    <span class="ico-search">🔍</span>
    <input type="search" id="search" placeholder="Buscar recetas o ingredientes…" oninput="renderCards()" autocomplete="off" />
  </div>
  <div class="chips-row" id="chips"></div>
  <div class="filter-row" id="diet-filter-row"></div>
</div>

<!-- ══ MAIN CANVAS ═════════════════════════════════════════ -->
<main class="recipe-page" id="recipe-page"></main>

<!-- ══ FAB ═════════════════════════════════════════════════ -->
<button class="fab" onclick="newRecipeWithAuth()">
  <span class="fab-plus">+</span> Nueva receta
</button>

<!-- ══ OVERLAY ═════════════════════════════════════════════ -->
<div class="overlay" id="overlay" onclick="closeAll()"></div>

<!-- ══ DETAIL SHEET ════════════════════════════════════════ -->
<div class="sheet" id="detail-sheet">
  <div class="sheet-handle"></div>
  <div id="detail-inner"></div>
</div>

<!-- ══ COOK MODE ═══════════════════════════════════════════ -->
<div class="cook-mode" id="cook-mode">
  <div class="cook-header">
    <span class="cook-recipe-name" id="cook-recipe-name"></span>
    <button class="cook-close" id="cook-close" type="button" aria-label="Salir">✕</button>
  </div>
  <div class="cook-progress"><div class="cook-progress-bar" id="cook-progress-bar"></div></div>
  <div class="cook-body">
    <div class="cook-step-counter" id="cook-step-counter"></div>
    <p class="cook-step-text" id="cook-step-text"></p>
  </div>
  <div class="cook-nav">
    <button class="cook-nav-btn" id="cook-prev" type="button">← Anterior</button>
    <button class="cook-nav-btn cook-nav-next" id="cook-next" type="button">Siguiente →</button>
  </div>
</div>

<!-- ══ FORM SHEET ══════════════════════════════════════════ -->
<div class="sheet" id="form-sheet">
  <div class="sheet-handle"></div>
  <div class="form-header">
    <span class="form-header-title" id="form-title">Nueva receta</span>
    <button class="btn-close" onclick="closeAll()">✕</button>
  </div>
  <div class="form-body">
    <input type="hidden" id="f-id" value="" />

    <!-- Importar desde enlace -->
    <div class="import-box" id="import-box">
      <label class="f-label">Importar desde un enlace</label>
      <div class="import-row">
        <input class="f-input" id="f-import-url" type="url" inputmode="url" placeholder="Pega la URL de una receta…" />
        <button class="btn-import" id="btn-import" type="button" onclick="importFromUrl()">Traer</button>
      </div>
      <p class="import-hint">Rellenará los campos automáticamente. Podrás revisarlos antes de guardar.</p>
    </div>

    <div class="f-group">
      <label class="f-label">Nombre *</label>
      <input class="f-input" id="f-name" placeholder="Ej: Pan de centeno" />
    </div>
    <div class="f-group">
      <label class="f-label">Descripción</label>
      <textarea class="f-textarea" id="f-desc" placeholder="Breve descripción…"></textarea>
    </div>
    <div class="f-row">
      <div class="f-group">
        <label class="f-label">Emoji</label>
        <input class="f-input" id="f-emoji" placeholder="🍞" style="font-size:1.4rem;text-align:center" maxlength="2" />
      </div>
      <div class="f-group">
        <label class="f-label">Categoría</label>
        <input class="f-input" id="f-cat" placeholder="Panadería" />
      </div>
    </div>
    <div class="f-row">
      <div class="f-group">
        <label class="f-label">Prep.</label>
        <input class="f-input" id="f-prep" placeholder="20 min" />
      </div>
      <div class="f-group">
        <label class="f-label">Cocción</label>
        <input class="f-input" id="f-cook" placeholder="30 min" />
      </div>
    </div>
    <div class="f-row">
      <div class="f-group">
        <label class="f-label">Total</label>
        <input class="f-input" id="f-total" placeholder="50 min" />
      </div>
      <div class="f-group">
        <label class="f-label">Raciones</label>
        <input class="f-input" id="f-servings" placeholder="8 uds" />
      </div>
    </div>
    <div class="f-row">
      <div class="f-group">
        <label class="f-label">Dificultad</label>
        <select class="f-input" id="f-diff">
          <option value="Fácil">Fácil</option>
          <option value="Media">Media</option>
          <option value="Difícil">Difícil</option>
        </select>
      </div>
      <div class="f-group">
        <label class="f-label">Color fondo</label>
        <input type="color" class="f-input" id="f-color" value="#f5e0c0" style="height:42px;padding:4px 8px;cursor:pointer" />
      </div>
    </div>
    <div class="f-group">
      <label class="f-label">Tipo de receta</label>
      <div class="diet-btns" id="diet-btns">
        <button class="diet-btn active" data-val="null" onclick="selectDiet(this)">Sin etiqueta</button>
        <button class="diet-btn" data-val="vegetariano" onclick="selectDiet(this)">🌿 Vegetariana</button>
        <button class="diet-btn" data-val="vegano" onclick="selectDiet(this)">🌱 Vegana</button>
      </div>
    </div>
    <div class="f-group">
      <label class="f-label">Alérgenos</label>
      <div class="allergen-checks" id="allergen-checks"></div>
    </div>
    <div class="f-group">
      <label class="f-label">Enlace a la receta original (opcional)</label>
      <input class="f-input" id="f-source" type="url" inputmode="url" placeholder="https://…" />
    </div>
    <div class="f-group">
      <label class="f-label">Etiquetas (separadas por coma)</label>
      <input class="f-input" id="f-tags" placeholder="pan, sin reposo, canela" />
    </div>
    <div class="f-group">
      <label class="f-label">Ingredientes</label>
      <div class="dyn-list" id="ing-list"></div>
      <button class="btn-add-row" type="button" onclick="addIng()">+ Añadir ingrediente</button>
    </div>
    <div class="f-group">
      <label class="f-label">Pasos</label>
      <div class="dyn-list" id="step-list"></div>
      <button class="btn-add-row" type="button" onclick="addStep()">+ Añadir paso</button>
    </div>
    <div class="f-group">
      <label class="f-label">Consejo (opcional)</label>
      <textarea class="f-textarea" id="f-tips" placeholder="Trucos, variaciones, conservación…"></textarea>
    </div>
    <button class="btn-submit" type="button" onclick="saveRecipe()">Guardar receta</button>
  </div>
</div>

<!-- ══ TOAST ════════════════════════════════════════════════ -->
<div class="toast" id="toast"></div>

<!-- ══ SCRIPTS ══════════════════════════════════════════════ -->
<script>
/* ── ALLERGEN CONFIG ───────────────────────────────────── */
const ALLERGENS = [
  { id: 'gluten', label: 'Gluten', icon: '🌾' },
  { id: 'lacteos', label: 'Lácteos', icon: '🥛' },
  { id: 'huevos', label: 'Huevos', icon: '🥚' },
  { id: 'frutos_secos', label: 'Frutos secos', icon: '🥜' },
  { id: 'soja', label: 'Soja', icon: '🫘' },
  { id: 'pescado', label: 'Pescado', icon: '🐟' },
  { id: 'marisco', label: 'Marisco', icon: '🦐' },
  { id: 'sesamo', label: 'Sésamo', icon: '🌾' },
  { id: 'apio', label: 'Apio', icon: '🥬' },
  { id: 'mostaza', label: 'Mostaza', icon: '🌿' },
  { id: 'sulfitos', label: 'Sulfitos', icon: '🍇' },
  { id: 'altramuces', label: 'Altramuces', icon: '🌼' },
  { id: 'moluscos', label: 'Moluscos', icon: '🦑' },
  { id: 'cacahuetes', label: 'Cacahuetes', icon: '🥜' },
];

function allergenLabel(id) {
  const a = ALLERGENS.find(x => x.id === id);
  return a ? `${a.icon} ${a.label}` : id;
}

/* ── HELPERS ───────────────────────────────────────────── */
// Extrae un dominio legible de una URL para mostrar en el botón
function prettyDomain(url) {
  try {
    const h = new URL(url).hostname.replace(/^www\./, '');
    return h;
  } catch(e) { return 'la fuente original'; }
}

/* ── STATE ─────────────────────────────────────────────── */
let recipes = [];
let activeTag = 'todos';
let activeDietFilter = null;      // null | 'vegetariano' | 'vegano'
let excludedAllergens = new Set(); // alérgenos a excluir
let checked = {};
let done = {};

/* ── WAKE LOCK ──────────────────────────────────────────── */
let wakeLock = null;
async function toggleWakeLock() {
  const btn = document.getElementById('wake-btn');
  if (wakeLock) {
    await wakeLock.release();
    wakeLock = null;
    btn.textContent = '💤';
    btn.classList.remove('wake-active');
    showToast('Pantalla normal');
  } else {
    if (!('wakeLock' in navigator)) {
      showToast('Tu navegador no soporta esta función');
      return;
    }
    try {
      wakeLock = await navigator.wakeLock.request('screen');
      btn.textContent = '👁️';
      btn.classList.add('wake-active');
      showToast('Pantalla siempre activa ✓');
      wakeLock.addEventListener('release', () => {
        wakeLock = null;
        btn.textContent = '💤';
        btn.classList.remove('wake-active');
      });
    } catch(e) {
      showToast('No se pudo activar: ' + e.message);
    }
  }
}
// Re-acquire wake lock after visibility change (e.g. tab switch)
document.addEventListener('visibilitychange', async () => {
  if (wakeLock !== null && document.visibilityState === 'visible') {
    try {
      wakeLock = await navigator.wakeLock.request('screen');
    } catch(e) {}
  }
});

/* ── THEME ─────────────────────────────────────────────── */
function applyTheme(dark) {
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  document.getElementById('theme-btn').textContent = dark ? '☀️' : '🌙';
  document.querySelector('meta[name="theme-color"]').content = dark ? '#160e07' : '#faf6f0';
}
function toggleTheme() {
  const dark = document.documentElement.getAttribute('data-theme') !== 'dark';
  localStorage.setItem('theme', dark ? 'dark' : 'light');
  applyTheme(dark);
}

/* ── BOOT ───────────────────────────────────────────────── */
async function boot() {
  const saved = localStorage.getItem('theme');
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  applyTheme(saved ? saved === 'dark' : prefersDark);

  const stored = localStorage.getItem('recetario_v4');
  if (stored) {
    recipes = JSON.parse(stored);
  } else {
    try {
      const res = await fetch('recipes.json');
      recipes = await res.json();
      persist();
    } catch(e) { recipes = []; }
  }
  rebuildChips();
  buildDietFilters();
  renderCards();
}

function persist() {
  localStorage.setItem('recetario_v4', JSON.stringify(recipes));
}

/* ── CHIPS ──────────────────────────────────────────────── */
function rebuildChips() {
  const all = new Set();
  recipes.forEach(r => (r.tags||[]).forEach(t => all.add(t)));
  const container = document.getElementById('chips');
  container.innerHTML = '';
  ['todos', ...all].forEach(tag => {
    const btn = document.createElement('button');
    btn.className = 'chip' + (tag === activeTag ? ' active' : '');
    btn.dataset.tag = tag;
    btn.textContent = tag === 'todos' ? 'Todas' : cap(tag);
    btn.onclick = () => setChip(btn);
    container.appendChild(btn);
  });
}

function setChip(el) {
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  activeTag = el.dataset.tag;
  renderCards();
}

function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

/* ── DIET / ALLERGEN FILTERS ────────────────────────────── */
function buildDietFilters() {
  const row = document.getElementById('diet-filter-row');
  row.innerHTML = '';

  // Botones de dieta
  const diets = [
    { val: 'vegetariano', label: '🌿 Vegetariano' },
    { val: 'vegano', label: '🌱 Vegano' },
  ];
  diets.forEach(d => {
    const btn = document.createElement('button');
    btn.className = 'filter-pill' + (activeDietFilter === d.val ? ' active' : '');
    btn.textContent = d.label;
    btn.onclick = () => {
      activeDietFilter = (activeDietFilter === d.val) ? null : d.val;
      buildDietFilters();
      renderCards();
    };
    row.appendChild(btn);
  });

  // Separador visual si hay alérgenos
  const usedAllergens = new Set();
  recipes.forEach(r => (r.allergens||[]).forEach(a => usedAllergens.add(a)));

  if (usedAllergens.size > 0) {
    const sep = document.createElement('span');
    sep.className = 'filter-sep';
    sep.textContent = 'sin';
    row.appendChild(sep);

    // Solo alérgenos presentes en alguna receta, en el orden de ALLERGENS
    ALLERGENS.filter(a => usedAllergens.has(a.id)).forEach(a => {
      const btn = document.createElement('button');
      btn.className = 'filter-pill filter-pill-exclude' + (excludedAllergens.has(a.id) ? ' active' : '');
      btn.textContent = `${a.icon} ${a.label}`;
      btn.onclick = () => {
        if (excludedAllergens.has(a.id)) excludedAllergens.delete(a.id);
        else excludedAllergens.add(a.id);
        buildDietFilters();
        renderCards();
      };
      row.appendChild(btn);
    });
  }
}

/* ── FILTER ─────────────────────────────────────────────── */
function filterRecipes() {
  const q = (document.getElementById('search').value || '').trim().toLowerCase();
  let list = recipes;
  if (activeTag !== 'todos') list = list.filter(r => (r.tags||[]).includes(activeTag));

  // Filtro de dieta: vegano también cumple "vegetariano"
  if (activeDietFilter === 'vegetariano') {
    list = list.filter(r => r.diet === 'vegetariano' || r.diet === 'vegano');
  } else if (activeDietFilter === 'vegano') {
    list = list.filter(r => r.diet === 'vegano');
  }

  // Filtro de alérgenos: excluir recetas que contengan cualquiera de los marcados
  if (excludedAllergens.size > 0) {
    list = list.filter(r => {
      const a = r.allergens || [];
      for (const ex of excludedAllergens) if (a.includes(ex)) return false;
      return true;
    });
  }

  if (q) list = list.filter(r =>
    r.name.toLowerCase().includes(q) ||
    (r.description||'').toLowerCase().includes(q) ||
    (r.tags||[]).some(t => t.includes(q)) ||
    (r.category||'').toLowerCase().includes(q) ||
    (r.ingredients||[]).some(ing => (ing.name||'').toLowerCase().includes(q))
  );
  return list;
}

/* ── DIET BADGE ─────────────────────────────────────────── */
function dietBadgeHTML(diet) {
  if (!diet) return '';
  const cls = diet === 'vegano' ? 'dbadge-vegan' : 'dbadge-vegetarian';
  const label = diet === 'vegano' ? '🌱 Vegano' : '🌿 Vegetariano';
  return `<span class="dbadge ${cls}">${label}</span>`;
}

/* ── RENDER CARDS ───────────────────────────────────────── */
function renderCards() {
  const page = document.getElementById('recipe-page');
  const list = filterRecipes();

  if (list.length === 0) {
    page.innerHTML = `<div class="empty-state">
      <span class="e-emoji">🥣</span>
      <h3>Sin resultados</h3>
      <p>Prueba otro término o añade una nueva receta.</p>
    </div>`;
    return;
  }

  // Build cards as DOM nodes to avoid innerHTML corruption
  page.innerHTML = '';
  list.forEach((r, i) => {
    const card = document.createElement('div');
    card.className = 'recipe-card card-standard';
    card.style.animationDelay = (i * 55) + 'ms';
    card.addEventListener('click', () => openDetail(r.id));
    const dietBadge = dietBadgeHTML(r.diet);
    const badgesBlock = dietBadge ? `<div class="card-badges">${dietBadge}</div>` : '';
    const tagsHTML = (r.tags||[]).map(t=>`<span class="ctag">${t}</span>`).join('');
    card.innerHTML = `
      <div class="card-emoji-col" style="background:${r.color}30">${r.emoji||'🍽️'}</div>
      <div class="card-body">
        <div class="card-cat">${r.category||''}</div>
        ${badgesBlock}
        <div class="card-title">${r.name}</div>
        ${r.description ? `<p class="card-desc">${r.description}</p>` : ''}
        <div class="card-meta">
          <span class="meta-item"><span class="meta-icon">⏱</span>${r.prepTime}</span>
          <span class="meta-item"><span class="meta-icon">🍽</span>${r.servings}</span>
          ${r.difficulty ? `<span class="meta-item"><span class="meta-icon">📊</span>${r.difficulty}</span>` : ''}
        </div>
        ${tagsHTML ? `<div class="card-tags">${tagsHTML}</div>` : ''}
      </div>`;
    page.appendChild(card);
  });
}

/* ── DETAIL SHEET ───────────────────────────────────────── */
function openDetail(id) {
  const r = recipes.find(x => x.id === id);
  if (!r) return;
  if (!checked[id]) checked[id] = {};
  if (!done[id]) done[id] = {};

  const allergens = r.allergens || [];
  let allergenHTML = '';
  if (allergens.length > 0) {
    allergenHTML = `
      <div class="allergen-section">
        <div class="allergen-title">⚠️ Contiene alérgenos</div>
        <div class="allergen-list">
          ${allergens.map(a => `<span class="allergen-tag">${allergenLabel(a)}</span>`).join('')}
        </div>
      </div>`;
  } else {
    allergenHTML = `
      <div class="allergen-section">
        <div class="allergen-title">Alérgenos</div>
        <span class="allergen-free">✓ Sin alérgenos declarados</span>
      </div>`;
  }

  const dietBadge = dietBadgeHTML(r.diet);
  const badgesBlock = dietBadge ? `<div class="detail-badges">${dietBadge}</div>` : '';

  // Bloque del enlace a la receta original
  let sourceHTML = '';
  if (r.sourceUrl && r.sourceUrl.trim()) {
    sourceHTML = `
      <h3 class="sec-title">Receta original</h3>
      <a class="source-link" href="${r.sourceUrl}" target="_blank" rel="noopener noreferrer">
        <span class="source-icon">🔗</span>
        <span class="source-text">Ver en ${prettyDomain(r.sourceUrl)}</span>
        <span class="source-arrow">↗</span>
      </a>`;
  }

  const inner = document.getElementById('detail-inner');
  inner.innerHTML = '';

  const colorBand = document.createElement('div');
  colorBand.className = 'detail-color-band';
  colorBand.style.background = r.color;
  inner.appendChild(colorBand);

  const emojiDiv = document.createElement('div');
  emojiDiv.className = 'detail-emoji';
  emojiDiv.textContent = r.emoji || '🍽️';
  inner.appendChild(emojiDiv);

  const body = document.createElement('div');
  body.className = 'detail-body';

  // Build ingredients list
  const ingsHTML = (r.ingredients||[]).map((ing, i) => `
    <li class="ing-item ${checked[id][i]?'checked':''}" data-idx="${i}">
      <span class="ing-check"></span>
      <span class="ing-amount">${ing.amount}</span>
      <span class="ing-name-text">${ing.name}</span>
    </li>`).join('');

  // Build steps list
  const stepsHTML = (r.steps||[]).map((s, i) => `
    <li class="step-item ${done[id][i]?'done':''}" data-idx="${i}">
      <span class="step-num">${i+1}</span>
      <p class="step-text">${s}</p>
    </li>`).join('');

  body.innerHTML = `
    <div class="detail-cat">${r.category||''}</div>
    ${badgesBlock}
    <h1 class="detail-title">${r.name}</h1>
    ${r.description ? `<p class="detail-desc">${r.description}</p>` : ''}
    <div class="detail-stats">
      <div class="dstat"><span class="dstat-icon">⏱</span><span class="dstat-val">${r.prepTime}</span><span class="dstat-lbl">Prep.</span></div>
      <div class="dstat"><span class="dstat-icon">🔥</span><span class="dstat-val">${r.cookTime}</span><span class="dstat-lbl">Cocción</span></div>
      <div class="dstat"><span class="dstat-icon">🍽</span><span class="dstat-val">${r.servings}</span><span class="dstat-lbl">Raciones</span></div>
      <div class="dstat"><span class="dstat-icon">📊</span><span class="dstat-val">${r.difficulty||'—'}</span><span class="dstat-lbl">Nivel</span></div>
    </div>
    ${allergenHTML}
    ${ingsHTML ? `<h3 class="sec-title">Ingredientes</h3><ul class="ing-list">${ingsHTML}</ul>` : ''}
    ${stepsHTML ? `<div class="sec-title-row"><h3 class="sec-title">Elaboración</h3><button class="btn-cook" id="btn-cook-${id}" type="button">👨‍🍳 Modo cocina</button></div><ol class="steps-list">${stepsHTML}</ol>` : ''}
    ${r.tips ? `<h3 class="sec-title">Consejo</h3><div class="tips-box">${r.tips}</div>` : ''}
    ${sourceHTML}
    <div class="detail-actions">
      <button class="btn-edit" id="btn-edit-${id}" type="button">✏️ Editar receta</button>
      <button class="btn-translate" id="btn-translate-${id}" type="button" title="Traducir al inglés">🇬🇧</button>
      <button class="btn-delete" id="btn-delete-${id}" type="button">🗑</button>
    </div>`;

  inner.appendChild(body);

  // Attach event listeners directly (no inline onclick — avoids scope issues)
  body.querySelector('.ing-list') && body.querySelector('.ing-list').addEventListener('click', e => {
    const li = e.target.closest('.ing-item');
    if (!li) return;
    const idx = parseInt(li.dataset.idx);
    checked[id][idx] = !checked[id][idx];
    li.classList.toggle('checked', checked[id][idx]);

  body.querySelector('.steps-list') && body.querySelector('.steps-list').addEventListener('click', e => {

    if (!li) return;
    const idx = parseInt(li.dataset.idx);
    done[id][idx] = !done[id][idx];
    li.classList.toggle('done', done[id][idx]);

  document.getElementById(`btn-edit-${id}`).addEventListener('click', () => editRecipe(id));
  document.getElementById(`btn-translate-${id}`).addEventListener('click', () => translateDetail(id));
  document.getElementById(`btn-delete-${id}`).addEventListener('click', () => askDelete(id));

/* ── COOK MODE (paso a paso a pantalla completa) ────────── */
let cookSteps = [];
let cookIndex = 0;

function openCookMode(id) {
  const r = recipes.find(x => x.id === id);
  if (!r || !(r.steps||[]).length) return;
  cookSteps = r.steps;
  cookIndex = 0;
  document.getElementById('cook-recipe-name').textContent = r.name;
  renderCookStep();
  document.getElementById('cook-mode').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function renderCookStep() {
  const total = cookSteps.length;
  const n = cookIndex + 1;
  document.getElementById('cook-step-counter').textContent = `Paso ${n} de ${total}`;
  document.getElementById('cook-step-text').textContent = cookSteps[cookIndex];
  document.getElementById('cook-progress-bar').style.width = (n / total * 100) + '%';

  const prev = document.getElementById('cook-prev');
  const next = document.getElementById('cook-next');
  prev.disabled = cookIndex === 0;
  next.textContent = (cookIndex === total - 1) ? '¡Listo! ✓' : 'Siguiente →';
}

function cookNext() {
  if (cookIndex < cookSteps.length - 1) {
    cookIndex++;
    renderCookStep();
  } else {
    closeCookMode();
    showToast('¡Buen provecho! 🎉');
  }
}

function cookPrev() {
  if (cookIndex > 0) {
    cookIndex--;
    renderCookStep();
  }
}

function closeCookMode() {
  document.getElementById('cook-mode').classList.remove('open');
  // Si el detalle sigue abierto debajo, mantenemos el scroll bloqueado
  const detailOpen = document.getElementById('detail-sheet').classList.contains('open');
  if (!detailOpen) document.body.style.overflow = '';
}

document.getElementById('cook-close').addEventListener('click', closeCookMode);
document.getElementById('cook-next').addEventListener('click', cookNext);
document.getElementById('cook-prev').addEventListener('click', cookPrev);

// Navegación con teclado (útil en escritorio)
document.addEventListener('keydown', e => {
  if (!document.getElementById('cook-mode').classList.contains('open')) return;
  if (e.key === 'ArrowRight') cookNext();
  else if (e.key === 'ArrowLeft') cookPrev();
  else if (e.key === 'Escape') closeCookMode();
});

// Swipe para navegar entre pasos
let cookTouchX0 = 0;
const cookModeEl = document.getElementById('cook-mode');
cookModeEl.addEventListener('touchstart', e => { cookTouchX0 = e.touches[0].clientX; }, { passive: true });
cookModeEl.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - cookTouchX0;
  if (dx < -60) cookNext();
  else if (dx > 60) cookPrev();
}, { passive: true });
const translationCache = {};
async function gtranslate(text, target='en') {
  if (!text || !text.trim()) return text;
  const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=es&tl=${target}&dt=t&q=${encodeURIComponent(text)}`;
  const res = await fetch(url);
  const data = await res.json();
  // Response is nested arrays: [[["translated","original",...],...],...]
  return data[0].map(chunk => chunk[0]).join('');
}

async function translateStrings(strings) {
  // Batch: join with a separator unlikely to appear in recipes, translate once
  const SEP = ' ||| ';
  const joined = strings.join(SEP);
  const translated = await gtranslate(joined);
  return translated.split(SEP).map(s => s.trim());
}

async function translateDetail(id) {
  const r = recipes.find(x => x.id === id);
  if (!r) return;
  const btn = document.getElementById(`btn-translate-${id}`);

  // Toggle back to Spanish
  if (btn.dataset.mode === 'en') {
    btn.dataset.mode = 'es';
    btn.textContent = '🇬🇧';
    btn.title = 'Translate to English';
    openDetail(id);
    return;
  }

  // Use cache
  if (translationCache[id]) {
    applyTranslation(id, translationCache[id]);
    return;
  }

  btn.textContent = '⏳';
  btn.disabled = true;
  try {
    // Collect all strings to translate in one batch
    const ingNames = (r.ingredients || []).map(i => i.name);
    const steps = r.steps || [];
    const allStrings = [
      r.name,
      r.description || '',
      r.category || '',
      r.difficulty || '',
      r.tips || '',
      ...ingNames,
      ...steps,
    ];
    const results = await translateStrings(allStrings);
    let i = 0;
    const t = {
      name: results[i++],
      description: results[i++],
      category: results[i++],
      difficulty: results[i++],
      tips: results[i++],
      ingNames: ingNames.map(() => results[i++]),
      steps: steps.map(() => results[i++]),
    };
    translationCache[id] = t;
    applyTranslation(id, t);
  } catch(e) {
    btn.textContent = '🇬🇧';
    btn.disabled = false;
    showToast('Translation failed — check your connection');
  }
}

  const titleEl = document.querySelector('#detail-inner .detail-title');
  const descEl = document.querySelector('#detail-inner .detail-desc');
  const catEl = document.querySelector('#detail-inner .detail-cat');
  if (titleEl) titleEl.textContent = t.name;
  if (descEl) descEl.textContent = t.description;
  if (catEl) catEl.textContent = t.category;
  document.querySelectorAll('#detail-inner .ing-name-text').forEach((el, i) => {
    if (t.ingNames?.[i] != null) el.textContent = t.ingNames[i];
  });
  document.querySelectorAll('#detail-inner .step-text').forEach((el, i) => {
    if (t.steps?.[i] != null) el.textContent = t.steps[i];
  });
  const tipsEl = document.querySelector('#detail-inner .tips-box');
  if (tipsEl && t.tips) tipsEl.textContent = t.tips;
  document.querySelectorAll('#detail-inner .sec-title').forEach(el => {
    const txt = el.textContent.trim();
    if (txt === 'Ingredientes') el.textContent = 'Ingredients';
    if (txt === 'Elaboración') el.textContent = 'Preparation';
    if (txt === 'Consejo') el.textContent = 'Tip';
    if (txt === 'Receta original') el.textContent = 'Original recipe';
  });
  // Traduce el texto del enlace de fuente si existe
  const srcText = document.querySelector('#detail-inner .source-text');
  if (srcText) srcText.textContent = srcText.textContent.replace('Ver en', 'View on');
  document.querySelectorAll('#detail-inner .dstat').forEach(ds => {

      if (val && t.difficulty) val.textContent = t.difficulty;
    }
    if (lbl && lbl.textContent.trim() === 'Prep.') lbl.textContent = 'Prep.';
    if (lbl && lbl.textContent.trim() === 'Cocción') lbl.textContent = 'Cook';
    if (lbl && lbl.textContent.trim() === 'Raciones') lbl.textContent = 'Servings';
  });
  const btn = document.getElementById(`btn-translate-${id}`);
  btn.textContent = '🇪🇸';
  btn.title = 'Volver al español';
  btn.dataset.mode = 'en';
  btn.disabled = false;
}

// Lista de proxies CORS públicos (se prueban en orden si uno falla)
const CORS_PROXIES = [
  url => `https://corsproxy.io/?url=${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
];

async function fetchHtmlViaProxy(url) {
  let lastErr = null;
  for (const proxify of CORS_PROXIES) {
    try {
      const res = await fetch(proxify(url));
      if (!res.ok) { lastErr = new Error('HTTP ' + res.status); continue; }
      const html = await res.text();
      if (html && html.length > 200) return html;
    } catch(e) { lastErr = e; }
  }
  throw lastErr || new Error('No se pudo descargar la página');
}

// Convierte una duración ISO 8601 (PT1H30M) a algo legible ("1 h 30 min")
function parseISODuration(iso) {
  if (!iso || typeof iso !== 'string') return '';
  const m = iso.match(/P(?:(\d+)D)?T?(?:(\d+)H)?(?:(\d+)M)?/);
  if (!m) return '';
  const d = parseInt(m[1]||0), h = parseInt(m[2]||0), min = parseInt(m[3]||0);
  const parts = [];
  if (d) parts.push(d + ' d');
  if (h) parts.push(h + ' h');
  if (min) parts.push(min + ' min');
  return parts.join(' ');
}

// Normaliza un ingrediente "1 1/2 cups flour" -> { amount, name } separando
// la parte numérica/unidad del nombre. Heurística sencilla y conservadora.
function splitIngredient(raw) {
  const text = String(raw).replace(/\s+/g, ' ').trim();
  // Captura número (incluye fracciones y rangos) + unidad opcional al inicio
  const m = text.match(/^([\d¼½¾⅓⅔⅛\/.,\s-]+(?:g|kg|ml|l|oz|lb|cups?|cup|tbsp|tsp|cdas?|cdtas?|cucharadas?|cucharaditas?|tazas?|taza|sobres?|pizcas?|g\.|gr|gramos?)?)\s+(.*)$/i);
  if (m && m[2]) {
    return { amount: m[1].trim(), name: m[2].trim() };
  }
  return { amount: '', name: text };
}

// Extrae el objeto Recipe del JSON-LD de la página
function extractRecipeFromHtml(html) {
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const scripts = [...doc.querySelectorAll('script[type="application/ld+json"]')];

  let recipeNode = null;
  for (const s of scripts) {
    let data;
    try { data = JSON.parse(s.textContent); } catch(e) { continue; }
    // El JSON-LD puede ser un objeto, un array, o tener @graph
    const candidates = [];
    const pushAll = obj => {
      if (!obj) return;
      if (Array.isArray(obj)) obj.forEach(pushAll);
      else {
        candidates.push(obj);
        if (obj['@graph']) pushAll(obj['@graph']);
      }
    };
    pushAll(data);
    recipeNode = candidates.find(c => {
      const t = c['@type'];
      return t === 'Recipe' || (Array.isArray(t) && t.includes('Recipe'));
    });
    if (recipeNode) break;
  }

  if (!recipeNode) return null;

  // Ingredientes
  const ingRaw = recipeNode.recipeIngredient || recipeNode.ingredients || [];
  const ingredients = (Array.isArray(ingRaw) ? ingRaw : [ingRaw])
    .map(splitIngredient).filter(i => i.name);

  // Pasos: recipeInstructions puede ser texto, array de strings,
  // array de HowToStep, o HowToSection con itemListElement
  const steps = [];
  const collectSteps = node => {
    if (!node) return;
    if (typeof node === 'string') {
      const t = node.replace(/\s+/g, ' ').trim();
      if (t) steps.push(t);
    } else if (Array.isArray(node)) {
      node.forEach(collectSteps);
    } else if (typeof node === 'object') {
      if (node['@type'] === 'HowToSection' && node.itemListElement) {
        collectSteps(node.itemListElement);
      } else if (node.text) {
        const t = String(node.text).replace(/\s+/g, ' ').trim();
        if (t) steps.push(t);
      }
    }
  };
  collectSteps(recipeNode.recipeInstructions);

  // Raciones
  let servings = recipeNode.recipeYield || '';
  if (Array.isArray(servings)) servings = servings[0] || '';
  servings = String(servings).trim();

  // Imagen / nombre / descripción
  const name = (recipeNode.name || '').trim();
  let description = (recipeNode.description || '').trim();
  if (description.length > 220) description = description.slice(0, 217) + '…';

  return {
    name,
    description,
    category: (Array.isArray(recipeNode.recipeCategory) ? recipeNode.recipeCategory[0] : recipeNode.recipeCategory || '').trim(),
    prepTime: parseISODuration(recipeNode.prepTime),
    cookTime: parseISODuration(recipeNode.cookTime),
    totalTime: parseISODuration(recipeNode.totalTime),
    servings,
    ingredients,
    steps,
  };
}

async function importFromUrl() {
  const url = document.getElementById('f-import-url').value.trim();
  if (!url) { showToast('Pega una URL primero'); return; }
  let valid;
  try { valid = new URL(url); } catch(e) { showToast('La URL no es válida'); return; }

  const btn = document.getElementById('btn-import');
  const original = btn.textContent;
  btn.textContent = '⏳';
  btn.disabled = true;

  try {
    const html = await fetchHtmlViaProxy(url);
    const data = extractRecipeFromHtml(html);
    if (!data || !data.name || (!data.ingredients.length && !data.steps.length)) {
      showToast('No se encontró una receta en esa página');
      return;
    }
    fillFormFromImport(data, url);
    showToast('Datos importados — revísalos antes de guardar ✓');
  } catch(e) {
    showToast('No se pudo leer la página. Prueba otro enlace.');
  } finally {
    btn.textContent = original;
    btn.disabled = false;
  }
}

// Rellena los campos del formulario con lo importado.

function fillFormFromImport(data, url) {
  const setIf = (elId, val) => {
    const el = document.getElementById(elId);
    if (el && val) el.value = val;
  };
  setIf('f-name', data.name);
  setIf('f-desc', data.description);
  setIf('f-cat', data.category);
  setIf('f-prep', data.prepTime);
  setIf('f-cook', data.cookTime);
  setIf('f-total', data.totalTime);
  setIf('f-servings', data.servings);
  setIf('f-source', url); // el enlace importado pasa a ser la receta original

  // Ingredientes
  if (data.ingredients.length) {
    const ingList = document.getElementById('ing-list');
    ingList.innerHTML = '';
    data.ingredients.forEach(ing => addIng(ing.amount, ing.name));
  }

  // Pasos
  if (data.steps.length) {
    const stepList = document.getElementById('step-list');
    stepList.innerHTML = '';
    data.steps.forEach(s => addStep(s));
  }

  // Lleva el foco al nombre para empezar a revisar desde arriba
  document.getElementById('f-name').focus();
  document.querySelector('.form-body').scrollTop = 0;
}

function openForm(editId) {
  const r = editId ? recipes.find(x => x.id === editId) : null;
  document.getElementById('form-title').textContent = r ? 'Editar receta' : 'Nueva receta';
  document.getElementById('f-id').value = r ? String(r.id) : '';

    if (el) el.value = (val != null ? val : '');
  };
  setVal('f-name', r?.name);
  setVal('f-desc', r?.description);
  setVal('f-emoji', r?.emoji);
  setVal('f-cat', r?.category);
  setVal('f-prep', r?.prepTime);
  setVal('f-cook', r?.cookTime);
  setVal('f-total', r?.totalTime);
  setVal('f-servings', r?.servings);
  setVal('f-source', r?.sourceUrl);
  setVal('f-tips', r?.tips);
  setVal('f-tags', r ? (r.tags||[]).join(', ') : '');
  document.getElementById('f-diff').value = r?.difficulty || 'Fácil';
  document.getElementById('f-color').value = r?.color || '#f5e0c0';

  // Diet
  const dietVal = r?.diet ?? null;
  document.querySelectorAll('.diet-btn').forEach(b => {
    const bVal = b.dataset.val === 'null' ? null : b.dataset.val;
    b.classList.toggle('active', bVal === dietVal);
  });

  // Allergens
  buildAllergenChecks(r?.allergens || []);

  // Ingredients
  const ingList = document.getElementById('ing-list');
  ingList.innerHTML = '';
  if (r && r.ingredients?.length) {
    r.ingredients.forEach(ing => addIng(ing.amount, ing.name));
  } else {
    addIng(); addIng(); addIng();
  }

  // Steps
  const stepList = document.getElementById('step-list');
  stepList.innerHTML = '';
  if (r && r.steps?.length) {
    r.steps.forEach(s => addStep(s));
  } else {
    addStep(); addStep();
  }

  openSheet('form-sheet');
}

function saveRecipe() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { showToast('El nombre es obligatorio'); return; }

  const ingredients = [...document.querySelectorAll('#ing-list .ing-dyn')].map(row => {
    const ins = row.querySelectorAll('input');
    return { amount: ins[0].value.trim(), name: ins[1].value.trim() };
  }).filter(i => i.name);

  const steps = [...document.querySelectorAll('#step-list .dyn-item textarea')]
    .map(ta => ta.value.trim()).filter(Boolean);

  const tags = document.getElementById('f-tags').value.split(',').map(t=>t.trim()).filter(Boolean);

  const activeDietBtn = document.querySelector('.diet-btn.active');
  const dietVal = activeDietBtn?.dataset.val ?? 'null';
  const diet = dietVal === 'null' ? null : dietVal;

  const allergens = [...document.querySelectorAll('.allergen-check-btn.selected')].map(b => b.dataset.id);

  const editIdStr = document.getElementById('f-id').value.trim();
  const editId = editIdStr ? parseInt(editIdStr, 10) : null;

  const recipe = {
    id: editId || Date.now(),
    name,
    description: document.getElementById('f-desc').value.trim(),
    emoji: document.getElementById('f-emoji').value.trim() || '🍽️',
    category: document.getElementById('f-cat').value.trim() || 'Sin categoría',
    prepTime: document.getElementById('f-prep').value.trim() || '—',
    cookTime: document.getElementById('f-cook').value.trim() || '—',
    totalTime: document.getElementById('f-total').value.trim() || '—',
    servings: document.getElementById('f-servings').value.trim() || '—',
    difficulty: document.getElementById('f-diff').value,
    color: document.getElementById('f-color').value,
    sourceUrl: document.getElementById('f-source').value.trim(),
    diet, allergens, tags, ingredients, steps,
    tips: document.getElementById('f-tips').value.trim(),
  };

  if (editId) {
    const idx = recipes.findIndex(x => x.id === editId);
    if (idx >= 0) {
      recipes[idx] = recipe;
    } else {
      recipes.unshift(recipe);
    }
    showToast('Receta actualizada ✓');
  } else {
    recipes.unshift(recipe);
    showToast('¡Receta guardada! 🎉');
  }

  persist();
  rebuildChips();
  closeAll();
  renderCards();
}

boot();
</script>
